apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent-frontend
  template:
    metadata:
      labels:
        app: ai-agent-frontend
    spec:
      containers:
        - name: ai-agent-frontend
          image: ai-agent-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-config
                  key: NEXT_PUBLIC_API_BASE_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-config
                  key: NODE_ENV
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-frontend-service
spec:
  type: ClusterIP
  selector:
    app: ai-agent-frontend
  ports:
    - port: 3000
      targetPort: 3000
