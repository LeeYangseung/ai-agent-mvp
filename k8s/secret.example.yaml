apiVersion: v1
kind: Secret
metadata:
  name: ai-agent-secrets
  namespace: default
type: Opaque
data:
  # Base64 인코딩된 값들 (실제 사용 시 변경 필요)
  # echo -n "your-actual-openai-api-key" | base64
  OPENAI_SECRET_KEY: your-actual-openai-api-key
  
  # Database 비밀번호
  # echo -n "your-actual-db-password" | base64
  DB_PASSWORD: your-actual-db-password
