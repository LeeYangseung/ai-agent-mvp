apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-agent-config
  namespace: default
data:
  # Frontend 설정
  # NEXT_PUBLIC_API_BASE_URL: "http://aiagent.local/api/v1" 
  NEXT_PUBLIC_API_BASE_URL: "" # 비워놓으면 브라우저 호스트 기반 자동 구성
  NODE_ENV: "production"
  
  # Backend 설정
  LOG_LEVEL: "info"
  VECTOR_STORE_DATA_DIR: "/workspace/app/data"
  ENV: "production"
  ROOT_PATH: "/api"
  OPENAPI_URL: "/openapi.json"
  DOCS_URL: "/docs"
  REDOC_URL: "/redoc"

  # Database 설정 (개발용)
  DATABASE_URL: "postgresql+asyncpg://admin:admin@postgres-service:5432/agent"
