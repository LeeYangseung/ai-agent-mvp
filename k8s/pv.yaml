# Dynamic Provisioning을 위한 PVC
# minikube의 기본 storageClass(standard)를 사용하여 자동으로 PV 생성

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName 미지정 시 기본 storageClass 사용 (minikube: standard)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectorstore-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName 미지정 시 기본 storageClass 사용 (minikube: standard)
